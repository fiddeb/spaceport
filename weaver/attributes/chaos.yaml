groups:
  - id: registry.spaceport.chaos
    type: attribute_group
    brief: Attributes describing chaos injection for testing and demos.
    stability: development
    attributes:
      - id: spaceport.chaos.failure_mode
        type: string
        brief: The type of failure injected by the chaos module.
        requirement_level: recommended
        examples: ["timeout", "error_500", "slow_response", "booking_failure"]
      - id: spaceport.chaos.latency_ms
        type: int
        brief: Artificial latency injected by the chaos module in milliseconds.
        requirement_level: recommended
        examples: [100, 500, 2000]
