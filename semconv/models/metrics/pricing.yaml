groups:
  - id: metric.spaceport.pricing.request.duration
    type: metric
    metric_name: spaceport.pricing.request.duration
    brief: Duration of price calculation requests from the API to the pricing service.
    instrument: histogram
    unit: ms
    stability: development
    attributes:
      - ref: spaceport.seat.class
        requirement_level: required
      - ref: spaceport.pricing.display_currency
        requirement_level: recommended
      - ref: spaceport.pricing.promo_applied
        requirement_level: recommended
      - ref: spaceport.chaos.failure_mode
        requirement_level: opt_in

  - id: metric.spaceport.departure.active
    type: metric
    metric_name: spaceport.departure.active
    brief: Number of departures currently available for booking.
    instrument: updowncounter
    unit: "{departure}"
    stability: development
    attributes:
      - ref: spaceport.departure.destination
        requirement_level: recommended
