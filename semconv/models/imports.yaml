imports:
  attribute_groups:
    - registry.http*        # http.request.method, http.response.status_code, etc.
    - registry.url*         # url.path, url.scheme, etc.
    - registry.network*     # network.protocol.version (used by http server metrics)
    - registry.server*      # server.address, server.port (used by http server metrics)
    - registry.error*       # error.type (used by http.server.request.duration)
    - registry.user_agent*  # user_agent.synthetic.type (opt_in on http server metrics)
    - registry.service*     # service.name, service.version
    - registry.telemetry*   # telemetry.sdk.language, telemetry.sdk.name, telemetry.sdk.version
    - registry.deployment*  # deployment.environment.name
    - registry.code*        # code.file.path, code.function.name, code.line.number
    - registry.client*      # client.address, client.port
    - registry.db*          # db.system, db.statement, etc.
    - registry.otel*        # otel.* SDK internal attributes
  metrics:
    - http.server.request.duration
    - http.server.active_requests
    - http.server.request.body.size
    - http.server.response.body.size
