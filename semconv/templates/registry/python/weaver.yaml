templates:
  - pattern: metric.py.j2
    filter: >
      .groups
      | map(select(.type == "metric" and .instrument != "gauge"))
      | . as $metrics
      | {
          metrics: $metrics,
          unique_optional_attrs: (
            $metrics
            | map(.attributes // [])
            | flatten
            | map(select(.requirement_level != "required"))
            | unique_by(.name)
          )
        }
    application_mode: single
    file_name: metric.py
  - pattern: attribute.py.j2
    filter: >
      .groups
      | map(select(.type == "attribute_group"))
      | map(.attributes // [])
      | flatten
      | map(select(.name | (startswith("spaceport.") or startswith("http.") or startswith("url."))))
      | sort_by(.name)
      | { attributes: . }
    application_mode: single
    file_name: attribute.py
  - pattern: span.py.j2
    filter: >
      .groups
      | map(select(.type == "span"))
      | { spans: . }
    application_mode: single
    file_name: span.py
comment_formats:
  python:
    format: markdown
    prefix: "# "
    indent_first_level_list_items: true
    shortcut_reference_link: true
    trim: true
    word_wrap:
      line_length: 79
default_comment_format: python
text_maps:
  attribute_type_method:
    string: string
    string[]: string_array
    int: int
    int[]: int_array
    double: float
    double[]: float_array
    boolean: bool
    boolean[]: bool_array
  attribute_type_value:
    string: str
    string[]: Sequence[str]
    int: int
    int[]: Sequence[int]
    double: float
    double[]: Sequence[float]
    boolean: bool
    boolean[]: Sequence[bool]
  metric_type_interface:
    counter: Counter
    updowncounter: UpDownCounter
    histogram: Histogram
    gauge: ObservableGauge
  metric_type_create:
    counter: create_counter
    updowncounter: create_up_down_counter
    histogram: create_histogram
    gauge: create_observable_gauge
  metric_type_method:
    counter: add
    updowncounter: add
    histogram: record
    gauge: observe
