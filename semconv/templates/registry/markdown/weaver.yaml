templates:
  - pattern: registry_readme.md.j2
    filter: "."
    application_mode: single
    file_name: README.md
  - pattern: metrics.md.j2
    filter: '.groups | map(select(.type == "metric")) | group_by(.id | split(".") | .[1]) | map({namespace: .[0].id | split(".") | .[1], metrics: .})'
    application_mode: each
    file_name: "{{ctx.namespace}}/metrics.md"
  - pattern: events.md.j2
    filter: '.groups | map(select(.type == "event")) | group_by(.id | split(".") | .[1]) | map({namespace: .[0].id | split(".") | .[1], events: .})'
    application_mode: each
    file_name: "{{ctx.namespace}}/events.md"
  - pattern: spans.md.j2
    filter: '.groups | map(select(.type == "span")) | group_by(.id | split(".") | .[1]) | map({namespace: .[0].id | split(".") | .[1], spans: .})'
    application_mode: each
    file_name: "{{ctx.namespace}}/spans.md"
  - pattern: entity_namespace.md.j2
    filter: '.groups | map(select(.type == "entity")) | group_by(.id | split(".") | .[1]) | map({id: .[0].id | split(".") | .[1], groups: .})'
    application_mode: each
    file_name: "entities/{{ ctx.id | kebab_case }}.md"
  - pattern: attribute_namespace.md.j2
    filter: '.groups | map(select(.type == "attribute_group")) | group_by(.id | split(".") | .[1]) | map({id: .[0].id | split(".") | .[1], groups: .})'
    application_mode: each
    file_name: "attributes/{{ ctx.id | kebab_case }}.md"
  - pattern: attributes_readme.md.j2
    filter: '.groups | map(select(.type == "attribute_group")) | group_by(.id | split(".") | .[1]) | map({id: .[0].id | split(".") | .[1]})'
    application_mode: single
    file_name: "attributes/README.md"
