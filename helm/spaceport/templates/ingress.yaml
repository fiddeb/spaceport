{{- if and .Values.enabled .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "spaceport.fullname" . }}
  labels:
    {{- include "spaceport.labels" . | nindent 4 }}
spec:
  ingressClassName: traefik
  rules:
  - host: {{ .Values.ingress.host }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "spaceport.fullname" . }}-frontend
            port:
              number: 80
{{- end }}
