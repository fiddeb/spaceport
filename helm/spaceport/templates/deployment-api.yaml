{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "spaceport.fullname" . }}-api
  labels:
    {{- include "spaceport.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "spaceport.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "spaceport.labels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "spaceport.fullname" . }}-config
          env:
            - name: OTEL_SERVICE_NAME
              value: spaceport-api
            - name: DATABASE_PATH
              value: /data/spaceport.db
          volumeMounts:
            - name: sqlite-data
              mountPath: /data
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      volumes:
        - name: sqlite-data
          persistentVolumeClaim:
            claimName: {{ include "spaceport.fullname" . }}-sqlite
{{- end }}
